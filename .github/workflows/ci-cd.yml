name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        
    - name: Run Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest backend/tests/

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - run: npm ci
    - run: npm run lint
    - run: npm run build

  demo-smoke:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Bootstrap and verify the synthetic demo
      env:
        MLFLOW_TRACKING_URI: file:${{ github.workspace }}/.mlruns-smoke
      run: |
        PYTHONPATH=. python backend/bootstrap_demo.py
        PYTHONPATH=. python backend/verify_demo.py

  dashboard-smoke:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Install frontend dependencies
      working-directory: frontend
      run: npm ci
    - name: Install Chromium for the browser smoke check
      working-directory: frontend
      run: npx playwright-cli install-browser chromium
    - name: Verify the dashboard in Chromium
      run: bash scripts/dashboard_smoke.sh

  compose-config:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - run: GRAFANA_ADMIN_PASSWORD=ci-test docker compose config --quiet
    - run: GRAFANA_ADMIN_PASSWORD=ci-test docker compose -f docker-compose.deploy.yml config --quiet

  build-and-push:
    needs: [backend-test, frontend-check, demo-smoke, dashboard-smoke, compose-config]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./backend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demand-sense-backend:latest
        
    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./frontend/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demand-sense-frontend:latest
        
    - name: Build and push MLflow
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./mlflow/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demand-sense-mlflow:latest

    - name: Build and push Prometheus
      uses: docker/build-push-action@v4
      with:
        context: ./monitoring/prometheus
        file: ./monitoring/prometheus/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demand-sense-prometheus:latest

    - name: Build and push Grafana
      uses: docker/build-push-action@v4
      with:
        context: ./monitoring/grafana
        file: ./monitoring/grafana/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demand-sense-grafana:latest
